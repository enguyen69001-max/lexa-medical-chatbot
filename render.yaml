# One-click deploy on Render (https://render.com) — free tier.
# Render reads this Blueprint and configures everything automatically.
services:
  - type: web
    name: lexa-medical-chatbot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python medassist_app.py"
    envVars:
      - key: HOST
        value: "0.0.0.0"        # listen on all interfaces (Render provides PORT)
      - key: CHAT_LLM
        value: "off"            # no local Ollama in the cloud -> scripted chat fallback
      - key: PYTHON_VERSION
        value: "3.11.9"
